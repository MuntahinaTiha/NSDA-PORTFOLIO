<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Portfolio</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand" href="index.html">Portfolio</a>

          <button
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#menu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a href="index.html" class="nav-link">Home</a>
              </li>
              <li class="nav-item">
                <a href="about.html" class="nav-link">About</a>
              </li>
              <li class="nav-item">
                <a href="portfolio-page.html" class="nav-link">Portfolio</a>
              </li>
              <li class="nav-item">
                <a href="service-page.html" class="nav-link">Service</a>
              </li>
              <li class="nav-item">
                <a href="contact-page.html" class="nav-link">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section id="pageTitle">
        <div class="container">
          <h1 class="text-center">Contact Me</h1>
          <p class="text-center">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Donec vel
            sapien eget nunc efficitur commodo.
          </p>
        </div>
      </section>
      <section id="inputForm">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
              <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                  <form id="contactForm">
                    <div class="mb-2">
                      <input
                        type="text"
                        id="name"
                        class="form-control"
                        placeholder="Full Name"
                      />
                    </div>

                    <div class="mb-2">
                      <input
                        type="email"
                        id="email"
                        class="form-control"
                        placeholder="Email Address"
                      />
                    </div>

                    <div class="mb-2">
                      <input
                        type="tel"
                        id="phone"
                        class="form-control"
                        placeholder="Phone Number"
                      />
                    </div>

                    <div class="mb-2">
                      <input
                        type="text"
                        id="address"
                        class="form-control"
                        placeholder="Address"
                      />
                    </div>

                    <div class="mb-3">
                      <textarea
                        id="message"
                        rows="3"
                        class="form-control"
                        placeholder="Your Message"
                      ></textarea>
                    </div>

                    <button
                      type="submit"
                      class="btn btn-primary w-100 rounded-pill"
                    >
                      Send Message
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="bg-dark text-white text-center p-3">
      <p>© 2026 My Portfolio</p>
      <p id="time"></p>
    </footer>
    <script
      src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"
      async
      defer
    ></script>
    <script src="./app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
